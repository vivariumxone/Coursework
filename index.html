<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css.css" />
    <title>Document</title>
  </head>
  <body>
    <video autoplay loop muted id="video">
      <source src="music/NVJ3KAEAAAA.mp4" type="video/mp4" />
    </video>

    <audio
      id="bgMusic"
      src="music/Iz_multfilma_-_SHrek_(SkySound.cc).mp3"
    ></audio>
    <button class="startGame" onclick="startGame()">Играть</button>
    <button
      id="continueGameBtn"
      class="startGame"
      onclick="continueGame()"
      style="display: none"
    >
      Продолжить
    </button>
    
    <audio id="bgMusic1" src="music/videoplayback2.mp3"></audio>
    <audio id="bgMusicDoor" src="music/Дверьбунккр.mp3"></audio>
    <audio id="bgMusic2" src="music/pda_4LbLWWH.mp3"></audio>
    <audio
      id="bgMusic3"
      src="music/agata-kristi-kak-na-voine_B1IN6VZv.mp3"
    ></audio>
    <audio id="bgMusic4" src="music/удар.mp3"></audio>
    <audio id="bgMusic5" src="music/ввв.mp3"></audio>
    <audio id="bgMusic6" src="music/подходи.ogg"></audio>
    <audio id="bgMusic7" src="music/сидровичмузло.mp3"></audio>
    <audio id="bgMusic8" src="music/чигурмузло.mp3"></audio>
    <audio id="bgMusic9" src="music/atmosfera-rynka.mp3"></audio>
    <audio id="bgMusic10" src="music/Банки.ogg"></audio>
    <audio id="bgMusic11" src="music/воттакбы.ogg"></audio>
    <audio id="bgMusic12" src="music/страшнмузыка.mp3"></audio>
    <audio id="bgMusic13" src="music/Bee_Gees.mp3"></audio>
    <audio id="bgMusic14" src="music/больница.wav"></audio>
    <audio id="bgMusic15" src="music/битаудар.mp3"></audio>

    <audio id="bgDarkMisuc1" src="music/darkcity.mp3"></audio>
<audio id="bgDarkMisuc2" src="music/Гитара1.mp3"></audio>
<audio id="bgDarkMisuc3" src="music/музыказакусочной.mp3"></audio>
<audio id="bgDarkMisuc4" src="music/Гитара2.mp3"></audio>
<audio id="bgDarkMisuc5" src="music/Жиган - Лимон.mp3"></audio>
<audio id="bgDarkMisuc6" src="music/Гитара3.mp3"></audio>
<audio id="bgDarkMisuc7" src="music/Гитара4.mp3"></audio>
<audio id="bgDarkMisuc8" src="music/пвпмужик.mp3"></audio>

    <div class="interface" id="interface">
      <span id="hp"></span>
      <span id="$"></span>
      <span id="food"></span>
      <span id="radiation">☢️</span>
    </div>

    <button
      onclick="skipToCharacterSelect()"
      style="
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 99999;
        background: red;
      "
    >
      ТЕСТ: ПРОПУСТИТЬ ДО ВЫБОРА ПЕРСОНАЖА
    </button>

    <div id="trading-screen" class="shop-container hidden">
      <div class="inventory" id="player-inventory"></div>

      <div class="inventory sidor-panel">
        <div class="sidor-content">
          <span class="label">ВЫРУЧКА:</span>
          <div id="pending-gold">0</div>
          <span class="currency">монет</span>
          <button class="cash-out-btn" onclick="finishDeal()">
            ЗАБРАТЬ БАБЛО
          </button>
        </div>
      </div>
    </div>

    <button class="startInvertiry" onclick="startInvertiry()">инвертарь</button>

    <script src="variables.js"></script>
    <script src="player.js"></script>
    <script src="save.js"></script>
    <script src="music/musicStart.js"></script>
    <script src="interface.js"></script>
    <script src="invertari.js"></script>

    <script src="pvp.js"></script>

    <script src="map/shop/shop.js"></script>
    <script src="map/sudrovich/mapSudrovich.js"></script>
    <script src="map/boss/boss.js"></script>
    <script src="map/chigur/chigur.js"></script>
    <script src="map/hospital/hospital.js"></script>
    <script src="map/playGitara/playGitara.js"></script>
    <script src="map/snack bar/snackBar.js"></script>
    
<script src="move.js"></script>

    <script src="map/map.js"></script>

    <script src="templates.js"></script>

    <script src="startgame.js"></script>
    <script src="delet.js"></script>

    <script src="index.js"></script>
  </body>
</html>
